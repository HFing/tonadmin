spring:
  application:
    name: tonadmin

  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5433/tonadmin_db
    username: tonadmin_user
    password: tonadmin_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true