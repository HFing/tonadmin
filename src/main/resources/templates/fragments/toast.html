<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<body>
<div th:fragment="toast">
    <div aria-live="polite" aria-atomic="true"
         style="position: fixed; top: 90px; right: 24px; z-index: 9999; min-width: 320px;">

        <div th:if="${successMessage}"
             class="toast"
             role="alert"
             aria-live="assertive"
             aria-atomic="true"
             data-delay="3000"
             data-autohide="true">

            <div class="toast-header bg-success text-white">
                <i class="fas fa-check-circle mr-2"></i>
                <strong class="mr-auto">Thành công</strong>
                <small>Vừa xong</small>
                <button type="button" class="ml-2 mb-1 close text-white" data-dismiss="toast" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <div class="toast-body bg-white text-gray-800" th:text="${successMessage}">
                Thao tác thành công
            </div>
        </div>

        <div th:if="${errorMessage}"
             class="toast"
             role="alert"
             aria-live="assertive"
             aria-atomic="true"
             data-delay="4000"
             data-autohide="true">

            <div class="toast-header bg-danger text-white">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <strong class="mr-auto">Lỗi</strong>
                <small>Vừa xong</small>
                <button type="button" class="ml-2 mb-1 close text-white" data-dismiss="toast" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <div class="toast-body bg-white text-gray-800" th:text="${errorMessage}">
                Có lỗi xảy ra
            </div>
        </div>

    </div>
</div>
</body>
</html>
