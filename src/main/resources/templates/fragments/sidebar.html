<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
<ul th:fragment="sidebar"
    class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion"
    id="accordionSidebar">

    <!-- Brand -->
    <a class="sidebar-brand d-flex align-items-center justify-content-center"
       th:href="@{/dashboard}">
        <div class="sidebar-brand-icon">
            <i class="fas fa-warehouse"></i>
        </div>
        <div class="sidebar-brand-text mx-3">
            TonAdmin
        </div>
    </a>

    <hr class="sidebar-divider my-0">

    <!-- Dashboard -->
    <li class="nav-item">
        <a class="nav-link" th:href="@{/dashboard}">
            <i class="fas fa-fw fa-tachometer-alt"></i>
            <span>Dashboard</span>
        </a>
    </li>

    <hr class="sidebar-divider">

    <!-- Business -->
    <div class="sidebar-heading">
        Kinh doanh
    </div>

    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'BRANCH_STAFF')">
        <a class="nav-link" th:href="@{/sales-orders}">
            <i class="fas fa-fw fa-shopping-cart"></i>
            <span>Bán hàng</span>
        </a>
    </li>

    <!-- Products - ADMIN only -->
    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
        <a class="nav-link collapsed" href="#" data-toggle="collapse" data-target="#collapseProducts"
           aria-expanded="true" aria-controls="collapseProducts">
            <i class="fas fa-fw fa-boxes"></i>
            <span>Sản phẩm</span>
        </a>

        <div id="collapseProducts" class="collapse" aria-labelledby="headingProducts"
             data-parent="#accordionSidebar">
            <div class="bg-white py-2 collapse-inner rounded">
                <h6 class="collapse-header">Quản lý sản phẩm:</h6>

                <a class="collapse-item" th:href="@{/products}">
                    Sản phẩm
                </a>

                <a class="collapse-item" th:href="@{/product-categories}">
                    Danh mục sản phẩm
                </a>
            </div>
        </div>
    </li>

    <hr class="sidebar-divider">

    <!-- Inventory -->
    <div class="sidebar-heading">
        Kho hàng
    </div>

    <li class="nav-item">
        <a class="nav-link collapsed" href="#" data-toggle="collapse" data-target="#collapseInventory"
           aria-expanded="true" aria-controls="collapseInventory">
            <i class="fas fa-fw fa-warehouse"></i>
            <span>Kho hàng</span>
        </a>

        <div id="collapseInventory" class="collapse" aria-labelledby="headingInventory"
             data-parent="#accordionSidebar">
            <div class="bg-white py-2 collapse-inner rounded">
                <h6 class="collapse-header">Quản lý kho:</h6>

                <a class="collapse-item"
                   sec:authorize="hasAnyRole('ADMIN', 'BRANCH_STAFF')"
                   th:href="@{/inventories}">
                    Tồn kho
                </a>

                <a class="collapse-item"
                   sec:authorize="hasRole('ADMIN')"
                   th:href="@{/inventories/import}">
                    Nhập kho
                </a>

                <a class="collapse-item"
                   sec:authorize="hasRole('ADMIN')"
                   th:href="@{/stock-transfers}">
                    Chuyển kho
                </a>

                <a class="collapse-item"
                   sec:authorize="hasAnyRole('ADMIN', 'BRANCH_STAFF')"
                   th:href="@{/inventories/transactions}">
                    Lịch sử kho
                </a>
            </div>
        </div>
    </li>

    <hr class="sidebar-divider" sec:authorize="hasRole('ADMIN')">

    <!-- System - ADMIN only -->
    <div class="sidebar-heading" sec:authorize="hasRole('ADMIN')">
        Hệ thống
    </div>

    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
        <a class="nav-link collapsed" href="#" data-toggle="collapse" data-target="#collapseSystem"
           aria-expanded="true" aria-controls="collapseSystem">
            <i class="fas fa-fw fa-cogs"></i>
            <span>Hệ thống</span>
        </a>

        <div id="collapseSystem" class="collapse" aria-labelledby="headingSystem"
             data-parent="#accordionSidebar">
            <div class="bg-white py-2 collapse-inner rounded">
                <h6 class="collapse-header">Thiết lập hệ thống:</h6>

                <a class="collapse-item" th:href="@{/branches}">
                    Chi nhánh
                </a>

                <a class="collapse-item" th:href="@{/users}">
                    Người dùng
                </a>
            </div>
        </div>
    </li>

    <hr class="sidebar-divider d-none d-md-block">

    <!-- Sidebar Toggler -->
    <div class="text-center d-none d-md-inline">
        <button class="rounded-circle border-0" id="sidebarToggle"></button>
    </div>

</ul>
</body>
</html>
