<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>TonAdmin - Create Product</title>

    <link th:href="@{/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
          rel="stylesheet">
    <link th:href="@{/css/sb-admin-2.min.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div id="content-wrapper" class="d-flex flex-column">

        <div id="content">

            <div th:replace="~{fragments/topbar :: topbar}"></div>

            <div class="container-fluid">

                <div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div>

                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <h1 class="h3 mb-0 text-gray-800">Thêm sản phẩm</h1>

                    <a th:href="@{/products}" class="btn btn-sm btn-secondary shadow-sm">
                        <i class="fas fa-arrow-left fa-sm text-white-50"></i>
                        Quay lại
                    </a>
                </div>

                <form th:action="@{/products/create}" th:object="${productRequest}" method="post">

                    <div class="card shadow mb-4">
                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">Thông tin cơ bản</h6>
                        </div>

                        <div class="card-body">

                            <div class="form-row">
                                <div class="form-group col-md-4">
                                    <label>Mã sản phẩm <span class="text-danger">*</span></label>
                                    <input type="text"
                                           th:field="*{code}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('code')} ? 'is-invalid'"
                                           placeholder="VD: TON001">

                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('code')}"
                                         th:errors="*{code}">
                                    </div>
                                </div>

                                <div class="form-group col-md-8">
                                    <label>Tên sản phẩm <span class="text-danger">*</span></label>
                                    <input type="text"
                                           th:field="*{name}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                           placeholder="VD: Tôn lạnh 0.4mm">

                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('name')}"
                                         th:errors="*{name}">
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Mô tả</label>
                                <textarea th:field="*{description}"
                                          class="form-control"
                                          rows="3"
                                          placeholder="Mô tả ngắn về sản phẩm"></textarea>
                            </div>

                            <div class="form-row">
                                <div class="form-group col-md-6">
                                    <label>Danh mục <span class="text-danger">*</span></label>
                                    <select th:field="*{categoryId}"
                                            class="form-control"
                                            th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid'">
                                        <option value="">-- Chọn danh mục --</option>
                                        <option th:each="category : ${categories}"
                                                th:value="${category.id}"
                                                th:text="${category.name}">
                                        </option>
                                    </select>

                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('categoryId')}"
                                         th:errors="*{categoryId}">
                                    </div>
                                </div>

                                <div class="form-group col-md-6">
                                    <label>Đơn vị tính <span class="text-danger">*</span></label>
                                    <select th:field="*{unit}"
                                            class="form-control"
                                            th:classappend="${#fields.hasErrors('unit')} ? 'is-invalid'">
                                        <option value="">-- Chọn đơn vị --</option>
                                        <option th:each="unit : ${units}"
                                                th:value="${unit}"
                                                th:text="${unit}">
                                        </option>
                                    </select>

                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('unit')}"
                                         th:errors="*{unit}">
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="card shadow mb-4">
                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">Thông số sản phẩm</h6>
                        </div>

                        <div class="card-body">

                            <div class="form-row">
                                <div class="form-group col-md-4">
                                    <label>Độ dày</label>
                                    <input type="number"
                                           step="0.01"
                                           min="0"
                                           th:field="*{thickness}"
                                           class="form-control"
                                           placeholder="VD: 0.4">
                                </div>

                                <div class="form-group col-md-4">
                                    <label>Chiều rộng</label>
                                    <input type="number"
                                           step="0.01"
                                           min="0"
                                           th:field="*{width}"
                                           class="form-control"
                                           placeholder="VD: 1.2">
                                </div>

                                <div class="form-group col-md-4">
                                    <label>Chiều dài</label>
                                    <input type="number"
                                           step="0.01"
                                           min="0"
                                           th:field="*{length}"
                                           class="form-control"
                                           placeholder="VD: 6">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group col-md-6">
                                    <label>Màu sắc</label>
                                    <input type="text"
                                           th:field="*{color}"
                                           class="form-control"
                                           placeholder="VD: Xanh, đỏ, bạc">
                                </div>

                                <div class="form-group col-md-6">
                                    <label>Chất liệu</label>
                                    <input type="text"
                                           th:field="*{material}"
                                           class="form-control"
                                           placeholder="VD: Thép, kẽm, hợp kim">
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="card shadow mb-4">
                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">Giá và tồn kho</h6>
                        </div>

                        <div class="card-body">

                            <div class="form-row">
                                <div class="form-group col-md-4">
                                    <label>Giá nhập</label>
                                    <input type="number"
                                           step="1000"
                                           min="0"
                                           th:field="*{importPrice}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('importPrice')} ? 'is-invalid'"
                                           placeholder="0">

                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('importPrice')}"
                                         th:errors="*{importPrice}">
                                    </div>
                                </div>

                                <div class="form-group col-md-4">
                                    <label>Giá bán</label>
                                    <input type="number"
                                           step="1000"
                                           min="0"
                                           th:field="*{sellingPrice}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('sellingPrice')} ? 'is-invalid'"
                                           placeholder="0">

                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('sellingPrice')}"
                                         th:errors="*{sellingPrice}">
                                    </div>
                                </div>

                                <div class="form-group col-md-4">
                                    <label>Tồn tối thiểu</label>
                                    <input type="number"
                                           step="0.01"
                                           min="0"
                                           th:field="*{minStock}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('minStock')} ? 'is-invalid'"
                                           placeholder="0">

                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('minStock')}"
                                         th:errors="*{minStock}">
                                    </div>
                                </div>
                            </div>

                            <hr>

                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i>
                                Lưu sản phẩm
                            </button>

                            <a th:href="@{/products}" class="btn btn-secondary">
                                Hủy
                            </a>

                        </div>
                    </div>

                </form>

            </div>

        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>

    </div>

</div>

<a class="scroll-to-top rounded" href="#page-top">
    <i class="fas fa-angle-up"></i>
</a>

<div th:replace="~{fragments/logoutmodal :: logoutmodal}"></div>
<div th:replace="~{fragments/loading :: loading}"></div>
<div th:replace="~{fragments/toast :: toast}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
