<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>TonAdmin - Không tìm thấy trang</title>

    <link th:href="@{/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
          rel="stylesheet">
    <link th:href="@{/css/sb-admin-2.min.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">

    <style>
        .error-card {
            max-width: 720px;
            margin: 0 auto;
        }

        .error-icon {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fc;
            border: 1px solid #e3e6f0;
            margin-bottom: 18px;
        }

        .error-code {
            font-size: 6rem;
            line-height: 1;
            font-weight: 800;
            color: #4e73df;
            letter-spacing: 4px;
        }

        .error-path {
            background: #f8f9fc;
            border: 1px solid #e3e6f0;
            border-radius: 8px;
            padding: 10px 12px;
            word-break: break-all;
            font-size: 0.9rem;
        }

        @media (max-width: 576px) {
            .error-code {
                font-size: 4.5rem;
            }
        }
    </style>
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div id="content-wrapper" class="d-flex flex-column">

        <div id="content">

            <div th:replace="~{fragments/topbar :: topbar}"></div>

            <div class="container-fluid">

                <div class="card shadow mb-4 error-card">
                    <div class="card-body text-center py-5">

                        <div class="error-icon">
                            <i class="fas fa-map-signs fa-2x text-primary"></i>
                        </div>

                        <div class="error-code">404</div>

                        <h1 class="h4 text-gray-900 font-weight-bold mt-3">
                            Không tìm thấy trang
                        </h1>

                        <p class="text-gray-600 mb-4">
                            Trang bạn đang truy cập không tồn tại, đã bị đổi đường dẫn hoặc bạn không có quyền truy cập.
                        </p>

                        <div class="error-path mb-4"
                             th:if="${path != null}">
                            <span class="text-muted">Đường dẫn:</span>
                            <strong th:text="${path}">/unknown</strong>
                        </div>

                        <div class="d-flex justify-content-center flex-wrap">
                            <a th:href="@{/dashboard}" class="btn btn-primary mr-2 mb-2">
                                <i class="fas fa-home"></i>
                                Về Dashboard
                            </a>

                            <a href="javascript:history.back()" class="btn btn-light border mb-2">
                                <i class="fas fa-arrow-left"></i>
                                Quay lại trang trước
                            </a>
                        </div>

                    </div>
                </div>

            </div>

        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>

    </div>

</div>

<a class="scroll-to-top rounded" href="#page-top">
    <i class="fas fa-angle-up"></i>
</a>

<div th:replace="~{fragments/logoutmodal :: logoutmodal}"></div>
<div th:replace="~{fragments/loading :: loading}"></div>
<div th:replace="~{fragments/toast :: toast}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
