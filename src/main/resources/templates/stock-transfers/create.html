<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>TonAdmin - Create Stock Transfer</title>

    <link th:href="@{/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
          rel="stylesheet">
    <link th:href="@{/css/sb-admin-2.min.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">

    <style>
        .stock-transfer-card {
            max-width: 1080px;
        }

        .transfer-item-row {
            background: #f8f9fc;
            border: 1px solid #e3e6f0;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .transfer-item-index {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #4e73df;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex: 0 0 auto;
        }

        .remove-item-btn {
            width: 36px;
            height: 36px;
        }

        .help-box {
            background: #f8f9fc;
            border-left: 4px solid #4e73df;
            padding: 12px 14px;
            border-radius: 8px;
            color: #5a5c69;
        }

        .summary-box {
            background: #ffffff;
            border: 1px solid #e3e6f0;
            border-radius: 10px;
        }
    </style>
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div id="content-wrapper" class="d-flex flex-column">

        <div id="content">

            <div th:replace="~{fragments/topbar :: topbar}"></div>

            <div class="container-fluid">

                <div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div>

                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <div>
                        <h1 class="h3 mb-0 text-gray-800">Tạo phiếu chuyển kho</h1>
                        <small class="text-muted">
                            Chuyển tồn kho từ chi nhánh xuất sang chi nhánh nhận
                        </small>
                    </div>

                    <a th:href="@{/stock-transfers}" class="btn btn-sm btn-light border shadow-sm">
                        <i class="fas fa-arrow-left"></i>
                        Quay lại
                    </a>
                </div>

                <form th:action="@{/stock-transfers/create}"
                      th:object="${stockTransferRequest}"
                      method="post">

                    <div class="card shadow mb-4 stock-transfer-card">

                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">
                                Thông tin chuyển kho
                            </h6>
                        </div>

                        <div class="card-body">

                            <div class="form-row">

                                <div class="form-group col-md-4">
                                    <label>Chi nhánh xuất <span class="text-danger">*</span></label>
                                    <select th:field="*{sourceBranchId}"
                                            class="form-control"
                                            th:classappend="${#fields.hasErrors('sourceBranchId')} ? 'is-invalid'">
                                        <option value="">-- Chọn chi nhánh xuất --</option>
                                        <option th:each="branch : ${branches}"
                                                th:value="${branch.id}"
                                                th:text="${branch.name}">
                                        </option>
                                    </select>

                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('sourceBranchId')}"
                                         th:errors="*{sourceBranchId}">
                                    </div>
                                </div>

                                <div class="form-group col-md-4">
                                    <label>Chi nhánh nhận <span class="text-danger">*</span></label>
                                    <select th:field="*{targetBranchId}"
                                            class="form-control"
                                            th:classappend="${#fields.hasErrors('targetBranchId')} ? 'is-invalid'">
                                        <option value="">-- Chọn chi nhánh nhận --</option>
                                        <option th:each="branch : ${branches}"
                                                th:value="${branch.id}"
                                                th:text="${branch.name}">
                                        </option>
                                    </select>

                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('targetBranchId')}"
                                         th:errors="*{targetBranchId}">
                                    </div>
                                </div>

                                <div class="form-group col-md-4">
                                    <label>Ghi chú</label>
                                    <input type="text"
                                           th:field="*{note}"
                                           class="form-control"
                                           placeholder="VD: Điều chuyển hàng sang chi nhánh B">
                                </div>

                            </div>

                            <div class="help-box mb-4">
                                <i class="fas fa-info-circle text-primary mr-1"></i>
                                Khi lưu phiếu, hệ thống sẽ trừ tồn ở chi nhánh xuất, cộng tồn ở chi nhánh nhận và ghi lịch sử kho.
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="font-weight-bold text-gray-800 mb-0">
                                    Sản phẩm chuyển
                                </h6>

                                <button type="button" class="btn btn-sm btn-primary" id="addItemBtn">
                                    <i class="fas fa-plus"></i>
                                    Thêm sản phẩm
                                </button>
                            </div>

                            <div th:if="${#fields.hasErrors('items')}" class="alert alert-danger">
                                <span th:errors="*{items}"></span>
                            </div>

                            <div id="transferItemsList">

                                <div th:each="item, stat : *{items}" class="transfer-item-row">

                                    <div class="d-flex align-items-start">
                                        <div class="transfer-item-index mr-3 item-index"
                                             th:text="${stat.index + 1}">
                                            1
                                        </div>

                                        <div class="flex-grow-1">
                                            <div class="form-row align-items-start">

                                                <div class="form-group col-md-8 mb-md-0">
                                                    <label>Sản phẩm <span class="text-danger">*</span></label>
                                                    <select th:field="*{items[__${stat.index}__].productId}"
                                                            class="form-control product-select"
                                                            th:classappend="${#fields.hasErrors('items[' + stat.index + '].productId')} ? 'is-invalid'">
                                                        <option value="">-- Chọn sản phẩm --</option>
                                                        <option th:each="product : ${products}"
                                                                th:value="${product.id}"
                                                                th:text="${product.code + ' - ' + product.name}">
                                                        </option>
                                                    </select>

                                                    <div class="invalid-feedback d-block"
                                                         th:if="${#fields.hasErrors('items[' + stat.index + '].productId')}"
                                                         th:errors="*{items[__${stat.index}__].productId}">
                                                    </div>
                                                </div>

                                                <div class="form-group col-md-3 mb-md-0">
                                                    <label>Số lượng <span class="text-danger">*</span></label>
                                                    <input type="number"
                                                           step="1"
                                                           min="1"
                                                           th:field="*{items[__${stat.index}__].quantity}"
                                                           class="form-control quantity-input"
                                                           th:classappend="${#fields.hasErrors('items[' + stat.index + '].quantity')} ? 'is-invalid'"
                                                           placeholder="VD: 10">

                                                    <div class="invalid-feedback d-block"
                                                         th:if="${#fields.hasErrors('items[' + stat.index + '].quantity')}"
                                                         th:errors="*{items[__${stat.index}__].quantity}">
                                                    </div>
                                                </div>

                                                <div class="form-group col-md-1 mb-0 text-md-right">
                                                    <label class="d-none d-md-block">&nbsp;</label>
                                                    <button type="button"
                                                            class="btn btn-light border text-danger remove-item-btn"
                                                            title="Xóa dòng này">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </div>

                                            </div>
                                        </div>
                                    </div>

                                </div>

                            </div>

                            <div class="summary-box shadow-sm mt-4 p-3">
                                <div class="d-flex justify-content-between">
                                    <span class="text-muted">Tổng dòng sản phẩm</span>
                                    <strong id="previewTotalRows">1 dòng</strong>
                                </div>
                            </div>

                            <hr>

                            <div class="d-flex justify-content-between align-items-center">
                                <a th:href="@{/stock-transfers}" class="btn btn-light border">
                                    Hủy
                                </a>

                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i>
                                    Lưu phiếu chuyển
                                </button>
                            </div>

                        </div>
                    </div>

                </form>

            </div>

        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>

    </div>

</div>

<a class="scroll-to-top rounded" href="#page-top">
    <i class="fas fa-angle-up"></i>
</a>

<div th:replace="~{fragments/logoutmodal :: logoutmodal}"></div>
<div th:replace="~{fragments/loading :: loading}"></div>
<div th:replace="~{fragments/toast :: toast}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const list = document.getElementById("transferItemsList");
        const addItemBtn = document.getElementById("addItemBtn");
        const previewTotalRows = document.getElementById("previewTotalRows");

        function updateSummary() {
            const rows = list.querySelectorAll(".transfer-item-row");
            previewTotalRows.textContent = rows.length + " dòng";
        }

        function updateRowIndexes() {
            const rows = list.querySelectorAll(".transfer-item-row");

            rows.forEach(function (row, index) {
                const indexBadge = row.querySelector(".item-index");
                const productSelect = row.querySelector(".product-select");
                const quantityInput = row.querySelector(".quantity-input");

                indexBadge.textContent = index + 1;

                productSelect.setAttribute("name", "items[" + index + "].productId");
                productSelect.setAttribute("id", "items" + index + ".productId");

                quantityInput.setAttribute("name", "items[" + index + "].quantity");
                quantityInput.setAttribute("id", "items" + index + ".quantity");
            });

            updateSummary();
        }

        function refreshRemoveButtons() {
            const rows = list.querySelectorAll(".transfer-item-row");
            const removeButtons = list.querySelectorAll(".remove-item-btn");

            removeButtons.forEach(function (button) {
                button.disabled = rows.length <= 1;
            });
        }

        addItemBtn.addEventListener("click", function () {
            const firstRow = list.querySelector(".transfer-item-row");
            const newRow = firstRow.cloneNode(true);

            const productSelect = newRow.querySelector(".product-select");
            const quantityInput = newRow.querySelector(".quantity-input");

            productSelect.value = "";
            quantityInput.value = "1";

            newRow.querySelectorAll(".invalid-feedback").forEach(function (el) {
                el.remove();
            });

            newRow.querySelectorAll(".is-invalid").forEach(function (el) {
                el.classList.remove("is-invalid");
            });

            list.appendChild(newRow);

            updateRowIndexes();
            refreshRemoveButtons();
        });

        list.addEventListener("click", function (event) {
            const removeButton = event.target.closest(".remove-item-btn");

            if (!removeButton) {
                return;
            }

            const rows = list.querySelectorAll(".transfer-item-row");

            if (rows.length <= 1) {
                return;
            }

            removeButton.closest(".transfer-item-row").remove();

            updateRowIndexes();
            refreshRemoveButtons();
        });

        updateRowIndexes();
        refreshRemoveButtons();
    });
</script>

</body>
</html>
