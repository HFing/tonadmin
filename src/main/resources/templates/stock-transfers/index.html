<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>TonAdmin - Stock Transfers</title>

    <link th:href="@{/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
          rel="stylesheet">
    <link th:href="@{/css/sb-admin-2.min.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div id="content-wrapper" class="d-flex flex-column">

        <div id="content">

            <div th:replace="~{fragments/topbar :: topbar}"></div>

            <div class="container-fluid">

                <div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div>

                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <div>
                        <h1 class="h3 mb-0 text-gray-800">Chuyển kho</h1>
                        <small class="text-muted">
                            Quản lý phiếu chuyển hàng giữa các chi nhánh
                        </small>
                    </div>

                    <a th:href="@{/stock-transfers/create}"
                       class="btn btn-sm btn-primary shadow-sm">
                        <i class="fas fa-plus fa-sm text-white-50"></i>
                        Tạo phiếu chuyển
                    </a>
                </div>

                <div class="card shadow mb-4">

                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Danh sách phiếu chuyển kho</h6>

                        <span class="badge badge-light"
                              th:text="${transferPage.totalElements + ' phiếu'}">
                            0 phiếu
                        </span>
                    </div>

                    <div class="card-body">

                        <div class="table-responsive">
                            <table class="table table-bordered table-hover" width="100%" cellspacing="0">
                                <thead class="thead-light">
                                <tr>
                                    <th>Mã phiếu</th>
                                    <th>Chi nhánh xuất</th>
                                    <th>Chi nhánh nhận</th>
                                    <th>Ghi chú</th>
                                    <th>Ngày tạo</th>
                                    <th>Người tạo</th>
                                    <th style="width: 90px;">Thao tác</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="transfer : ${transfers}">
                                    <td>
                                        <a class="font-weight-bold text-primary"
                                           th:href="@{/stock-transfers/{id}(id=${transfer.id})}"
                                           th:text="${transfer.transferCode}">
                                            TRF202605030001
                                        </a>
                                    </td>

                                    <td>
                                        <span class="font-weight-bold"
                                              th:text="${transfer.sourceBranch != null ? transfer.sourceBranch.name : '—'}">
                                            Kho A
                                        </span>
                                    </td>

                                    <td>
                                        <span class="font-weight-bold"
                                              th:text="${transfer.targetBranch != null ? transfer.targetBranch.name : '—'}">
                                            Kho B
                                        </span>
                                    </td>

                                    <td th:text="${transfer.note != null && !transfer.note.isBlank() ? transfer.note : '—'}">
                                        —
                                    </td>

                                    <td th:text="${transfer.createdAt != null ? #temporals.format(transfer.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">
                                        —
                                    </td>   

                                    <td th:text="${transfer.createdBy != null && !transfer.createdBy.isBlank() ? transfer.createdBy : '—'}">
                                        —
                                    </td>

                                    <td>
                                        <a th:href="@{/stock-transfers/{id}(id=${transfer.id})}"
                                           class="btn btn-info btn-sm"
                                           title="Xem chi tiết">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                    </td>
                                </tr>

                                <tr th:if="${#lists.isEmpty(transfers)}">
                                    <td colspan="7" class="text-center text-muted">
                                        Chưa có phiếu chuyển kho nào.
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-3"
                             th:if="${transferPage.totalPages > 0}">

                            <small class="text-muted"
                                   th:text="'Hiển thị ' + ${#lists.size(transfers)} + ' / ' + ${transferPage.totalElements} + ' phiếu'">
                                Hiển thị 10 / 100 phiếu
                            </small>

                            <nav th:if="${transferPage.totalPages > 1}">
                                <ul class="pagination pagination-sm mb-0">

                                    <li class="page-item"
                                        th:classappend="${transferPage.first} ? 'disabled'">
                                        <a class="page-link"
                                           th:href="@{/stock-transfers(page=${transferPage.number - 1}, size=${transferPage.size})}">
                                            Trước
                                        </a>
                                    </li>

                                    <li class="page-item"
                                        th:each="pageNumber : ${#numbers.sequence(0, transferPage.totalPages - 1)}"
                                        th:classappend="${pageNumber == transferPage.number} ? 'active'">

                                        <a class="page-link"
                                           th:href="@{/stock-transfers(page=${pageNumber}, size=${transferPage.size})}"
                                           th:text="${pageNumber + 1}">
                                            1
                                        </a>
                                    </li>

                                    <li class="page-item"
                                        th:classappend="${transferPage.last} ? 'disabled'">
                                        <a class="page-link"
                                           th:href="@{/stock-transfers(page=${transferPage.number + 1}, size=${transferPage.size})}">
                                            Sau
                                        </a>
                                    </li>

                                </ul>
                            </nav>
                        </div>

                    </div>
                </div>

            </div>

        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>

    </div>

</div>

<a class="scroll-to-top rounded" href="#page-top">
    <i class="fas fa-angle-up"></i>
</a>

<div th:replace="~{fragments/logoutmodal :: logoutmodal}"></div>
<div th:replace="~{fragments/loading :: loading}"></div>
<div th:replace="~{fragments/toast :: toast}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
