<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>TonAdmin - Users</title>

    <link th:href="@{/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
          rel="stylesheet">
    <link th:href="@{/css/sb-admin-2.min.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div id="content-wrapper" class="d-flex flex-column">

        <div id="content">

            <div th:replace="~{fragments/topbar :: topbar}"></div>

            <div class="container-fluid">

                <div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div>

                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <h1 class="h3 mb-0 text-gray-800">Quản lý người dùng</h1>

                    <a th:href="@{/users/create}" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">
                        <i class="fas fa-plus fa-sm text-white-50"></i>
                        Thêm người dùng
                    </a>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Danh sách người dùng</h6>
                    </div>

                    <div class="card-body">
                        <div class="table-responsive">

                            <table class="table table-bordered table-hover" width="100%" cellspacing="0">
                                <thead class="thead-light">
                                <tr>
                                    <th>Email</th>
                                    <th>Họ tên</th>
                                    <th>Số điện thoại</th>
                                    <th>Chi nhánh</th>
                                    <th>Quyền</th>
                                    <th>Trạng thái</th>
                                    <th style="width: 160px;">Thao tác</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="user : ${users}">
                                    <td>
                                        <span class="font-weight-bold text-primary" th:text="${user.email}">
                                            admin@tonadmin.com
                                        </span>
                                    </td>

                                    <td th:text="${user.lastName + ' ' + user.firstName}">
                                        Admin TonAdmin
                                    </td>

                                    <td th:text="${user.phone != null ? user.phone : '—'}">
                                        090...
                                    </td>

                                    <td th:text="${user.branch != null ? user.branch.name : 'Toàn hệ thống'}">
                                        Toàn hệ thống
                                    </td>

                                    <td>
                                        <span th:each="userRole : ${user.userHasRoles}"
                                              class="badge badge-primary mr-1"
                                              th:text="${userRole.role.roleType}">
                                            ADMIN
                                        </span>
                                    </td>

                                    <td>
                                        <span th:if="${user.userStatus.name() == 'ACTIVE'}"
                                              class="badge badge-success">
                                            Đang hoạt động
                                        </span>

                                        <span th:if="${user.userStatus.name() == 'LOCKED'}"
                                              class="badge badge-danger">
                                            Đã khóa
                                        </span>

                                        <span th:if="${user.userStatus.name() == 'INACTIVE'}"
                                              class="badge badge-secondary">
                                            Không hoạt động
                                        </span>
                                    </td>

                                    <td>
                                        <a th:href="@{/users/{id}/edit(id=${user.id})}"
                                           class="btn btn-warning btn-sm"
                                           title="Sửa">
                                            <i class="fas fa-edit"></i>
                                        </a>

                                        <form th:action="@{/users/{id}/toggle-status(id=${user.id})}"
                                              method="post"
                                              class="d-inline">

                                            <button type="submit"
                                                    class="btn btn-sm"
                                                    th:classappend="${user.userStatus.name() == 'ACTIVE'} ? 'btn-danger' : 'btn-success'"
                                                    th:title="${user.userStatus.name() == 'ACTIVE'} ? 'Khóa' : 'Mở khóa'">

                                                <i th:class="${user.userStatus.name() == 'ACTIVE'} ? 'fas fa-lock' : 'fas fa-unlock'"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>

                                <tr th:if="${#lists.isEmpty(users)}">
                                    <td colspan="7" class="text-center text-muted">
                                        Chưa có người dùng nào.
                                    </td>
                                </tr>
                                </tbody>
                            </table>

                        </div>
                    </div>
                </div>

            </div>

        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>

    </div>

</div>

<a class="scroll-to-top rounded" href="#page-top">
    <i class="fas fa-angle-up"></i>
</a>

<div th:replace="~{fragments/logoutmodal :: logoutmodal}"></div>
<div th:replace="~{fragments/loading :: loading}"></div>
<div th:replace="~{fragments/toast :: toast}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
