<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>TonAdmin - Product Categories</title>

    <link th:href="@{/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
          rel="stylesheet">
    <link th:href="@{/css/sb-admin-2.min.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div id="content-wrapper" class="d-flex flex-column">

        <div id="content">

            <div th:replace="~{fragments/topbar :: topbar}"></div>

            <div class="container-fluid">

                <div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div>

                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <h1 class="h3 mb-0 text-gray-800">Danh mục sản phẩm</h1>

                    <a th:href="@{/product-categories/create}"
                       class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">
                        <i class="fas fa-plus fa-sm text-white-50"></i>
                        Thêm danh mục
                    </a>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Danh sách danh mục sản phẩm</h6>
                    </div>

                    <div class="card-body">
                        <div class="table-responsive">

                            <table class="table table-bordered table-hover" width="100%" cellspacing="0">
                                <thead class="thead-light">
                                <tr>
                                    <th style="width: 160px;">Mã danh mục</th>
                                    <th>Tên danh mục</th>
                                    <th style="width: 150px;">Trạng thái</th>
                                    <th style="width: 160px;">Thao tác</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="category : ${categories}">
                                    <td>
                                        <span class="font-weight-bold text-primary" th:text="${category.code}">
                                            TON_LANH
                                        </span>
                                    </td>

                                    <td th:text="${category.name}">
                                        Tôn lạnh
                                    </td>

                                    <td>
                                        <span th:if="${category.active}" class="badge badge-success">
                                            Đang hoạt động
                                        </span>
                                        <span th:unless="${category.active}" class="badge badge-secondary">
                                            Đã khóa
                                        </span>
                                    </td>

                                    <td>
                                        <a th:href="@{/product-categories/{id}/edit(id=${category.id})}"
                                           class="btn btn-warning btn-sm"
                                           title="Sửa">
                                            <i class="fas fa-edit"></i>
                                        </a>

                                        <form th:action="@{/product-categories/{id}/toggle-active(id=${category.id})}"
                                              method="post"
                                              class="d-inline">
                                            <button type="submit"
                                                    class="btn btn-sm"
                                                    th:classappend="${category.active} ? 'btn-danger' : 'btn-success'"
                                                    th:title="${category.active} ? 'Khóa' : 'Mở khóa'">
                                                <i th:class="${category.active} ? 'fas fa-lock' : 'fas fa-unlock'"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>

                                <tr th:if="${#lists.isEmpty(categories)}">
                                    <td colspan="4" class="text-center text-muted">
                                        Chưa có danh mục sản phẩm nào.
                                    </td>
                                </tr>
                                </tbody>
                            </table>

                        </div>
                    </div>
                </div>

            </div>

        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>

    </div>

</div>

<a class="scroll-to-top rounded" href="#page-top">
    <i class="fas fa-angle-up"></i>
</a>

<div th:replace="~{fragments/logoutmodal :: logoutmodal}"></div>
<div th:replace="~{fragments/loading :: loading}"></div>
<div th:replace="~{fragments/toast :: toast}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
